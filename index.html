<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Spellbook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css?v=2.0">.
</head>
<body>
    <header class="no-print">
        <h1>Arcane Compendium</h1>
        <nav class="main-nav">
            <button id="nav-browse" class="nav-btn active">Browse Spells</button>
            <button id="nav-spellbook" class="nav-btn">My Selected Spells</button>
            <button class="print-btn" onclick="window.print()">🖨️ Print Spellbook</button>
        </nav>
    </header>

    <main>
        <section id="view-browse" class="view-section active no-print">
            <aside id="filters">
                <h3>Filters</h3>
                
                <label>Class</label>
                <select id="filter-class">
                    <option value="All">All Classes</option>
                    </select>
                <br>

                <label>School of Magic</label>
                <select id="filter-school">
                    <option value="All">All Schools</option>
                    </select>
                <br>

                <label>Spell Level</label>
                <div id="filter-levels" class="checkbox-grid">
                    </div>
            </aside>

            <div class="content-area">
                <div id="available-spells-container" class="card-grid"></div>
            </div>
        </section>

       <section id="view-spellbook" class="view-section">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; flex-wrap: wrap; border-bottom: 1px solid #444; margin-bottom: 20px;">
        <h2 class="no-print" style="margin: 0;">My Spellbook</h2>
        
        <div class="no-print" style="display: flex; align-items: center; gap: 10px;">
            <label for="spellbook-level-filter">Show:</label>
            <select id="spellbook-level-filter" onchange="renderSpellbook()" style="padding: 8px; background: #222; color: white; border: 1px solid #444; border-radius: 4px;">
                <option value="all">All Levels</option>
                <option value="0">Cantrips</option>
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
                <option value="4">Level 4</option>
                <option value="5">Level 5</option>
                <option value="6">Level 6</option>
                <option value="7">Level 7</option>
                <option value="8">Level 8</option>
                <option value="9">Level 9</option>
            </select>
        </div>
    </div>

    <div id="selected-spells-container"></div>
</section>
    </main>

    <script src="app.js"></script>
</body>
</html>
